* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; background:#ffffff; overflow:hidden; }

#c {
  position:absolute;
  top:0; left:0;
  width:100%; height:100%;
  cursor:grab;
  display:block;
}
#c:active { cursor:grabbing; }

/* Button wrapper — sits above canvas */
#btn-wrap {
  position:fixed;
  bottom:8vh;
  left:50%;
  transform:translateX(-50%);
  z-index:200;
  padding:7px;
  background:transparent;
  transition:opacity 0.3s;
}
#btn-wrap.hidden { opacity:0; pointer-events:none; }



#punch-btn {
  display:block;
  background:#f0f0ee;
  color:#000;
  font-family:'SpaceMono', monospace;
  font-weight:400;
  font-size:13px;
  letter-spacing:0.3em;
  padding:16px 68px;
  border:none;
  border-radius:0;
  cursor:pointer;
  user-select:none;
  transition:background 0.15s;
}
#punch-btn:hover  { background:#e6e6e4; }
#punch-btn:active { background:#dadad8; }
</style>

<body>
<canvas id="c"></canvas>

<div id="btn-wrap">
  <button id="punch-btn">PUNCH</button>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const btnWrap = document.getElementById('btn-wrap');
const punchBtn = document.getElementById('punch-btn');
let W, H, cx, cy;

let sRotX = 0, sRotY = Math.PI;
const CONST_VEL_X = 0.0006, CONST_VEL_Y = 0.0012;
let sVelX = CONST_VEL_X, sVelY = CONST_VEL_Y;
let dragging = false, lastMX, lastMY;
let exploded = false, explodeParticles = [];
const GRAVITY_EX = 0.50;
const DISPLAY_FONT = "SpaceMono,'Courier New',monospace";

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  cx = W/2; cy = H/2;
}

function drawStar(ctx, cx, cy, outerR, innerR) {
  ctx.beginPath();
  for (let i = 0; i < 10; i++) {
    const a = -Math.PI / 2 + i * Math.PI / 5;
    const r = i % 2 === 0 ? outerR : innerR;
    const x = cx + Math.cos(a) * r;
    const y = cy + Math.sin(a) * r;
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }
  ctx.closePath();
  ctx.fill();
}

function fitText(ctx, text, maxW, maxSize) {
  let size = maxSize;
  do {
    ctx.font = `900 ${size}px ${DISPLAY_FONT}`;
    if (ctx.measureText(text).width <= maxW) return size;
    size -= 2;
  } while (size > 24);
  return size;
}

function sampleText() {
  const S = 512;
  const oc = document.createElement('canvas');
  oc.width = S; oc.height = S;
  const o = oc.getContext('2d');

  o.fillStyle = '#000';
  o.textAlign = 'center';
  o.textBaseline = 'middle';
  const particleSize = 3;
  const groupOffsetY = -5 * particleSize;

  const popSize = fitText(o, 'POP', S * 0.44, Math.floor(S * 0.25));
  o.font = `900 ${popSize}px ${DISPLAY_FONT}`;

  const punchSize = fitText(o, 'PUNCH', S * 0.70, Math.floor(S * 0.22));
  o.font = `900 ${punchSize}px ${DISPLAY_FONT}`;
  const punchY = S * 0.66 + groupOffsetY;
  const punchMetrics = o.measureText('PUNCH');
  const punchTop = punchY - (punchMetrics.actualBoundingBoxAscent || punchSize * 0.5);

  o.font = `900 ${popSize}px ${DISPLAY_FONT}`;
  const popMetrics = o.measureText('POP');
  const particleGap = 3 * particleSize;
  const popY = punchTop - particleGap - (popMetrics.actualBoundingBoxDescent || popSize * 0.12);
  o.fillText('POP', S * 0.50, popY);

  o.font = `900 ${punchSize}px ${DISPLAY_FONT}`;
  o.fillText('PUNCH', S * 0.50, punchY);

  drawStar(o, S * 0.12, S * 0.52 + groupOffsetY, S * 0.055, S * 0.024);
  drawStar(o, S * 0.88, S * 0.52 + groupOffsetY, S * 0.055, S * 0.024);

  return { data: o.getImageData(0,0,S,S).data, S };
}

function buildDots() {
  surfaceDots = [];
  const N = 2000;
  const PUNCH = 'PUNCH';
  const ASCII_BLOCKS = ['■', '▪', '▬'];
  const ASCII_LETTERS = ['P','O','N','C','H','M','E','A','T','R','U'];
  const ASCII_MARKS = ['#','*','/','|','+','^','_','-',';'];
  const ASCII_DOTS = ['·', '.', '•'];
  const golden = Math.PI * (3 - Math.sqrt(5));

  for (let i = 0; i < N; i++) {
    const y = 1 - (i/(N-1))*2;
    const phi = Math.acos(Math.max(-1, Math.min(1, y)));
    const theta = golden * i;

    // Pre-compute static 3D position for shadow zone
    // Light source: top-right → shadow zone: bottom-left
    const sx = Math.sin(phi)*Math.sin(theta);
    const sy = Math.cos(phi);
    // shadow: 0=lit, 1=fully shadowed. Fixed to sphere surface so it rotates with ball
    const lowerMask = Math.max(0, Math.min(1, (sy + 0.08) / 0.46));
    const sideMask = Math.pow(Math.abs(sx), 0.72);
    const shadow = Math.max(0, Math.min(1, (sideMask * 0.58 + lowerMask * 0.68 - 0.24) * lowerMask));

    // Interior ASCII: dense symbols in shadow zone (left-bottom area of sphere)
    // but only for non-edge dots — edge handled at render time with PUNCH letters
    let isShadowAscii = false;
    let shadowCh = '.';
    const pickShadowChar = () => {
      const r = Math.random();
      if (r < 0.30) return ASCII_BLOCKS[Math.floor(Math.random() * ASCII_BLOCKS.length)];
      if (r < 0.50) return ASCII_LETTERS[Math.floor(Math.random() * ASCII_LETTERS.length)];
      if (r < 0.80) return ASCII_MARKS[Math.floor(Math.random() * ASCII_MARKS.length)];
      return ASCII_DOTS[Math.floor(Math.random() * ASCII_DOTS.length)];
    };
    if (shadow > 0.42) {
      isShadowAscii = true;
      shadowCh = pickShadowChar();
    } else if (shadow > 0.20 && Math.random() < 0.70) {
      isShadowAscii = true;
      shadowCh = pickShadowChar();
    }

    surfaceDots.push({
      theta, phi,
      label: PUNCH[i % PUNCH.length], // for PUNCH flicker
      shadowCh, isShadowAscii, shadow,
      flashTimer: 0
    });
  }

  const { data, S } = sampleText();
  textParticles = [];
  const TSTEP = 3;
  for (let py = 0; py < S; py += TSTEP) {
    for (let px = 0; px < S; px += TSTEP) {
      if (data[(py*S+px)*4+3] < 60) continue;
      const u = px/S, v = py/S;
      const homeTheta = (u-0.5)*Math.PI*0.82;
      const homePhi   = (0.5-v)*Math.PI*0.72 + Math.PI/2;
      const startTheta = homeTheta + (Math.random()-0.5)*Math.PI*2;
      const startPhi   = Math.random()*Math.PI;
      textParticles.push({ homeTheta, homePhi, cTheta:startTheta, cPhi:startPhi, vTheta:0, vPhi:0 });
      const bt = homeTheta + Math.PI;
      textParticles.push({ homeTheta:bt, homePhi, cTheta:bt+(Math.random()-0.5)*Math.PI*2, cPhi:Math.random()*Math.PI, vTheta:0, vPhi:0 });
    }
  }
}

function project(theta, phi, rx, ry) {
  let x = Math.sin(phi)*Math.sin(theta);
  let y = Math.cos(phi);
  let z = Math.sin(phi)*Math.cos(theta);
  const cy2=Math.cos(ry),sy2=Math.sin(ry);
  let x1=x*cy2+z*sy2, z1=-x*sy2+z*cy2; x=x1; z=z1;
  const cx2=Math.cos(rx),sx2=Math.sin(rx);
  let y1=y*cx2-z*sx2, z2=y*sx2+z*cx2;
  return {x, y:y1, z:z2};
}

const GRAVITY=0.018, FLOW_DAMP=0.88;
let dragDVelY=0, dragDVelX=0;

function drawSphere() {
  const R = Math.min(W, H) * 0.38;
  if (!dragging) {
    sVelX = CONST_VEL_X; sVelY = CONST_VEL_Y;
    sRotY += sVelY; sRotX += sVelX;
    const MAX_TILT = 0.75;
    if (sRotX >  MAX_TILT) { sRotX =  MAX_TILT; sVelX=0; }
    if (sRotX < -MAX_TILT) { sRotX = -MAX_TILT; sVelX=0; }
  }
  for (const p of textParticles) {
    let dTheta = p.homeTheta - p.cTheta;
    let dPhi   = p.homePhi   - p.cPhi;
    while (dTheta >  Math.PI) dTheta -= Math.PI*2;
    while (dTheta < -Math.PI) dTheta += Math.PI*2;
    p.vTheta = (p.vTheta + dTheta*GRAVITY + dragDVelY) * FLOW_DAMP;
    p.vPhi   = (p.vPhi   + dPhi  *GRAVITY + dragDVelX) * FLOW_DAMP;
    p.cTheta += p.vTheta;
    p.cPhi    = Math.max(0.01, Math.min(Math.PI-0.01, p.cPhi+p.vPhi));
  }
  dragDVelY=0; dragDVelX=0;

  for (const d of surfaceDots) {
    const {x,y,z} = project(d.theta, d.phi, sRotX, sRotY);
    if (z < 0) continue;
    const depth = (z+1)/2;
    const edgeness = 1 - depth; // 0=centre, 1=edge
    const asciiFrontMin = 0.04;

    ctx.fillStyle = '#5bcde8';
    ctx.textBaseline = 'middle'; ctx.textAlign = 'center';

    if (d.flashTimer > 0) {
      // PUNCH flicker — anywhere on sphere
      d.flashTimer--;
      ctx.globalAlpha = 0.92;
      ctx.font = `900 13px ${DISPLAY_FONT}`;
      ctx.fillText(d.label, cx+x*R, cy+y*R);

    } else if (edgeness > 0.72) {
      // Outer silhouette edge — PUNCH letters, fade with edgeness
      ctx.globalAlpha = 0.3 + edgeness * 0.6;
      const fs = edgeness > 0.88 ? 13 : 10;
      ctx.font = `900 ${fs}px ${DISPLAY_FONT}`;
      ctx.fillText(d.label, cx+x*R, cy+y*R);

    } else if (d.isShadowAscii && edgeness > asciiFrontMin) {
      // Shadow ASCII sits on the visible front surface instead of fading back into the rim.
      const frontFade = Math.min(1, Math.max(0, (depth - 0.08) / 0.62));
      const shadowAlpha = (0.20 + d.shadow * 0.68) * frontFade;
      ctx.globalAlpha = shadowAlpha;
      const fs = d.shadow > 0.42 ? 13 : 10;
      ctx.font = `900 ${fs}px ${DISPLAY_FONT}`;
      ctx.fillText(d.shadowCh, cx+x*R, cy+y*R);

    } else {
      // Interior lit zone — round dot
      if (Math.random() < 0.0006) d.flashTimer = 6 + Math.floor(Math.random()*16);
      ctx.globalAlpha = 0.2 + depth * 0.6;
      ctx.textBaseline = 'top'; ctx.textAlign = 'left';
      const r = 1.2;
      ctx.beginPath();
      ctx.arc(cx+x*R, cy+y*R, r, 0, Math.PI*2);
      ctx.fill();
    }

    ctx.textBaseline = 'top'; ctx.textAlign = 'left';
  }
  for (const p of textParticles) {
    const renderTheta = p.cTheta + (sRotY - Math.PI);
    const {x,y,z} = project(renderTheta, p.cPhi, 0, 0);
    if (z < -0.05) continue;
    const depth = (z+1)/2;
    const sq = 3;
    ctx.globalAlpha = 1.0;
    ctx.fillStyle = '#5bcde8';
    ctx.fillRect(cx+x*R-sq/2, cy+y*R-sq/2, sq, sq);
  }
  ctx.globalAlpha = 1;
}

function triggerExplosion() {
  if (exploded) return;
  exploded = true;
  btnWrap.classList.add('hidden');
  const R = Math.min(W,H)*0.38;
  const CHARS = 'PUNCHME^|!;*A.,_'.split('');
  explodeParticles = [];
  surfaceDots.forEach(d => {
    const {x,y,z} = project(d.theta, d.phi, sRotX, sRotY);
    if (z < 0) return;
    explodeParticles.push({ x:cx+x*R, y:cy+y*R, vx:0,vy:0, isChar:false, ch:d.label, floorY:H-4, restitution:0.28+Math.random()*0.42, friction:0.6+Math.random()*0.25, settled:false, delay:0 });
  });
  textParticles.forEach(p => {
    const rt = p.cTheta+(sRotY-Math.PI);
    const {x,y,z} = project(rt, p.cPhi, 0, 0);
    if (z < -0.05) return;
    explodeParticles.push({ x:cx+x*R, y:cy+y*R, vx:0,vy:0, isChar:true, ch:CHARS[Math.floor(Math.random()*CHARS.length)], floorY:H-4, restitution:0.28+Math.random()*0.42, friction:0.58+Math.random()*0.28, settled:false, delay:0 });
  });
  explodeParticles.forEach(p => {
    const dx=p.x-cx, dy=p.y-cy;
    const dist=Math.sqrt(dx*dx+dy*dy)||1;
    const force=(500+Math.random()*700)/dist;
    const angle=Math.atan2(dy,dx)+(Math.random()-0.5)*1.0;
    p.vx=Math.cos(angle)*force*(0.3+Math.random()*0.8);
    p.vy=Math.sin(angle)*force*(0.2+Math.random()*0.7)-Math.random()*3;
    p.delay=Math.floor((dist/400)*10+Math.random()*8);
  });
}

function drawExplosion() {
  let anyMoving = false;
  ctx.font = `900 8px ${DISPLAY_FONT}`;
  ctx.textBaseline = 'middle'; ctx.textAlign = 'center';
  for (const p of explodeParticles) {
    if (p.delay > 0) { p.delay--; anyMoving=true; continue; }
    if (!p.settled) {
      p.vy += GRAVITY_EX;
      p.vx *= 0.991+Math.random()*0.003;
      p.x  += p.vx+(Math.random()-0.5)*0.12;
      p.y  += p.vy;
      if (p.y >= p.floorY) {
        p.y=p.floorY;
        p.vy=-Math.abs(p.vy)*p.restitution;
        p.vx*=p.friction;
        if (Math.abs(p.vy)<0.8) p.vy*=0.5;
        if (Math.abs(p.vy)<0.15&&Math.abs(p.vx)<0.15){p.settled=true;p.vx=0;p.vy=0;}
      }
      if(p.x<0){p.x=0;p.vx=Math.abs(p.vx)*0.35;}
      if(p.x>W){p.x=W;p.vx=-Math.abs(p.vx)*0.35;}
      anyMoving=true;
    }
    ctx.globalAlpha = p.settled ? 0.4 : 0.85;
    ctx.fillStyle = '#5bcde8';
    if (p.isChar) ctx.fillText(p.ch, p.x, p.y);
    else { ctx.beginPath(); ctx.arc(p.x,p.y,1.5,0,Math.PI*2); ctx.fill(); }
  }
  ctx.globalAlpha=1; ctx.textAlign='left'; ctx.textBaseline='top';
  if (!anyMoving) {
    setTimeout(()=>{
      exploded=false; explodeParticles=[];
      btnWrap.classList.remove('hidden');
      buildDots();
    }, 2500);
  }
}

function draw() {
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#ffffff';
  ctx.fillRect(0,0,W,H);
  if (exploded) drawExplosion();
  else drawSphere();
  requestAnimationFrame(draw);
}

canvas.addEventListener('mousedown', e=>{ if(exploded)return; dragging=true; sVelX=0; sVelY=0; lastMX=e.clientX; lastMY=e.clientY; });
window.addEventListener('mousemove', e=>{
  if(!dragging) return;
  const dx=e.clientX-lastMX, dy=e.clientY-lastMY;
  sVelY=dx*0.003; sVelX=dy*0.003;
  sRotY+=sVelY; sRotX=Math.max(-0.75,Math.min(0.75,sRotX+sVelX));
  dragDVelY=-sVelY*0.2; dragDVelX=-sVelX*0.2;
  lastMX=e.clientX; lastMY=e.clientY;
});
window.addEventListener('mouseup',()=>{ dragging=false; });
canvas.addEventListener('touchstart',e=>{ if(exploded)return; dragging=true; sVelX=0; sVelY=0; lastMX=e.touches[0].clientX; lastMY=e.touches[0].clientY; },{passive:true});
window.addEventListener('touchmove',e=>{
  if(!dragging) return;
  const dx=e.touches[0].clientX-lastMX, dy=e.touches[0].clientY-lastMY;
  sVelY=dx*0.003; sVelX=dy*0.003;
  sRotY+=sVelY; sRotX=Math.max(-0.75,Math.min(0.75,sRotX+sVelX));
  dragDVelY=-sVelY*0.2; dragDVelX=-sVelX*0.2;
  lastMX=e.touches[0].clientX; lastMY=e.touches[0].clientY;
},{passive:true});
window.addEventListener('touchend',()=>{ dragging=false; });
window.addEventListener('resize', resize);
punchBtn.addEventListener('click', triggerExplosion);

function init() {
  resize();
  const start = () => {
    buildDots();
    draw();
  };
  if (document.fonts && document.fonts.ready) {
    document.fonts.ready.then(start);
  } else {
    start();
  }
}

init();
</script>
</body>
</html>
