<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pop Punch</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: #fff; overflow: hidden; }
  canvas { display: block; width: 100%; height: 100%; cursor: pointer; }
  #hint {
    position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
    font-family: 'Courier New', monospace; font-size: 9px;
    letter-spacing: 0.35em; color: #a0d8e0; pointer-events: none;
    transition: opacity 0.6s ease;
  }
  /* Hidden canvas to pre-load the font */
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hint">CLICK TO EXPLODE</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const hint = document.getElementById('hint');

const BG = '#ffffff';
const DOT_COLOR = '#00bdd6';
const CHAR_COLORS = ['#00bdd6','#00bdd6','#00bdd6','#00bdd6','#33cade','#66d6e3'];
const CHARS = "A^|!;*\"',._`~-+=<>?/#$%&".split('');

let W, H, particles = [], exploded = false, animId = null;

const DOT_R   = 3.0;
const DOT_GAP = 9;

function resize() {
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W;
  canvas.height = H;
}

function sampleText(lines, fontFamily) {
  const oc = document.createElement('canvas');
  oc.width = W; oc.height = H;
  const octx = oc.getContext('2d');
  const fontSize = Math.min(W * 0.195, H * 0.27, 140);
  const fontStr = `900 ${fontSize}px 'Arial Black', Arial, sans-serif`;
  octx.font = fontStr;
  octx.textBaseline = 'alphabetic';
  const lineH = fontSize * 1.18;
  const totalH = lines.length * lineH;
  const startY = (H - totalH) / 2 + fontSize * 0.82;
  octx.font = fontStr;
  octx.letterSpacing = '0px';

  lines.forEach((line, i) => {
    octx.font = fontStr;
    octx.letterSpacing = '0px';
    const tw = octx.measureText(line).width;
    octx.fillStyle = '#000';
    octx.fillText(line, (W - tw) / 2, startY + i * lineH);
  });
  return octx.getImageData(0, 0, W, H);
}

function buildParticles(fontFamily) {
  const imageData = sampleText(['PUNCH', 'OVER'], fontFamily);
  const d = imageData.data;
  particles = [];

  for (let py = DOT_GAP; py < H - DOT_GAP; py += DOT_GAP) {
    for (let px = DOT_GAP; px < W - DOT_GAP; px += DOT_GAP) {
      // average alpha in small neighbourhood
      let totalA = 0, count = 0;
      const radius = 3;
      for (let sy = -radius; sy <= radius; sy++) {
        for (let sx = -radius; sx <= radius; sx++) {
          const ix = Math.min(W-1, Math.max(0, px + sx));
          const iy = Math.min(H-1, Math.max(0, py + sy));
          totalA += d[(iy * W + ix) * 4 + 3];
          count++;
        }
      }
      const a = totalA / count;
      if (a > 55) {
        const ch = CHARS[Math.floor(Math.random() * CHARS.length)];
        const color = CHAR_COLORS[Math.floor(Math.random() * CHAR_COLORS.length)];
        particles.push({
          x: px, y: py, ox: px, oy: py,
          vx: 0, vy: 0,
          ch, color,
          floorY: H - DOT_R - 2,
          restitution: 0.28 + Math.random() * 0.42,
          groundFriction: 0.58 + Math.random() * 0.28,
          settled: false,
          delay: 0,
          state: 'dot'
        });
      }
    }
  }
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = BG;
  ctx.fillRect(0, 0, W, H);

  for (const p of particles) {
    ctx.fillStyle = p.color;
    if (p.state === 'dot') {
      const s = DOT_R * 2;
      ctx.fillRect(p.x - DOT_R, p.y - DOT_R, s, s);
    } else {
      ctx.font = `8px Courier New, monospace`;
      ctx.textBaseline = 'middle';
      ctx.textAlign = 'center';
      ctx.fillText(p.ch, p.x, p.y);
    }
  }
  ctx.textAlign = 'left';
  ctx.textBaseline = 'top';
}

function explode(cx, cy) {
  if (exploded) return;
  exploded = true;
  hint.style.opacity = '0';

  for (const p of particles) {
    p.state = 'char';
    const dx = p.ox - cx;
    const dy = p.oy - cy;
    const dist = Math.sqrt(dx*dx + dy*dy) || 1;
    const force = (650 + Math.random() * 800) / dist;
    const angle = Math.atan2(dy, dx) + (Math.random() - 0.5) * 1.1;
    p.vx = Math.cos(angle) * force * (0.4 + Math.random() * 0.9);
    p.vy = Math.sin(angle) * force * (0.25 + Math.random() * 0.85) - Math.random() * 4;
    p.x = p.ox; p.y = p.oy;
    p.settled = false;
    p.delay = Math.floor((dist / 600) * 14 + Math.random() * 10);
  }

  cancelAnimationFrame(animId);
  loop();
}

function loop() {
  const GRAVITY = 0.50;
  let anyMoving = false;

  for (const p of particles) {
    if (p.settled) continue;
    if (p.delay > 0) { p.delay--; anyMoving = true; continue; }

    p.vy += GRAVITY;
    p.vx *= 0.991 + Math.random() * 0.003;
    p.x += p.vx + (Math.random() - 0.5) * 0.12;
    p.y += p.vy;

    if (p.y >= p.floorY) {
      p.y = p.floorY;
      p.vy = -Math.abs(p.vy) * p.restitution;
      p.vx *= p.groundFriction;
      if (Math.abs(p.vy) < 0.8) p.vy *= 0.5;
      if (Math.abs(p.vy) < 0.15 && Math.abs(p.vx) < 0.15) {
        p.settled = true; p.y = p.floorY; p.vx = 0; p.vy = 0;
      }
    }
    if (p.x < 2)     { p.x = 2;     p.vx =  Math.abs(p.vx) * 0.35; }
    if (p.x > W - 2) { p.x = W - 2; p.vx = -Math.abs(p.vx) * 0.35; }
    if (!p.settled) anyMoving = true;
  }

  draw();
  if (anyMoving) {
    animId = requestAnimationFrame(loop);
  } else {
    setTimeout(reset, 2200);
  }
}

function reset() {
  exploded = false;
  buildParticles(currentFont);
  draw();
  setTimeout(() => { hint.style.opacity = '1'; }, 500);
}

canvas.addEventListener('click', (e) => { explode(e.clientX, e.clientY); });
window.addEventListener('resize', () => {
  resize();
  if (!exploded) { buildParticles(currentFont); draw(); }
});

const currentFont = 'Arial Black';
resize();
buildParticles(currentFont);
draw();
</script>
</body>
</html>
